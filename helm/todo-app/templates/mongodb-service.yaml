apiVersion: v1
kind: Service
metadata:
  name: {{ include "todo-app.fullname" . }}-mongodb
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
    component: mongodb
spec:
  type: ClusterIP
  selector:
    {{- include "todo-app.selectorLabels" . | nindent 4 }}
    component: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb
      protocol: TCP
