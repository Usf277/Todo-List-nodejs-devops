# loki-stack — Loki (log storage) + Promtail (log collector DaemonSet)
# Chart: grafana/loki-stack
# Promtail runs on every node and ships all pod stdout/stderr logs to Loki

loki:
  enabled: true

  persistence:
    enabled: true
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  config:
    limits_config:
      retention_period: 168h   # 7 days — keep logs for one week

promtail:
  enabled: true

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push

# Grafana is already installed via kube-prometheus-stack — don't install a second one
grafana:
  enabled: false
